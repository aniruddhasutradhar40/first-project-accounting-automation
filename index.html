# 🌍 Colourful World Watch HTML

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffcc);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
}

@keyframes bg{
    0%{background-position:left;}
    100%{background-position:right;}
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    width:90%;
}

.clock{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    transition:0.3s;
}

.clock:hover{
    transform:scale(1.05);
}

.country{
    font-size:24px;
    margin-bottom:10px;
    font-weight:bold;
}

.time{
    font-size:35px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="clock">
        <div class="country">🇧🇩 Bangladesh</div>
        <div class="time" id="bd"></div>
    </div>

    <div class="clock">
        <div class="country">🇺🇸 USA</div>
        <div class="time" id="usa"></div>
    </div>

    <div class="clock">
        <div class="country">🇬🇧 UK</div>
        <div class="time" id="uk"></div>
    </div>

    <div class="clock">
        <div class="country">🇦🇪 UAE</div>
        <div class="time" id="uae"></div>
    </div>

</div>

<script>

function updateClock(){

    let options = {
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
    };

    document.getElementById("bd").innerHTML =
        new Date().toLocaleTimeString("en-US",
        {...options, timeZone:"Asia/Dhaka"});

    document.getElementById("usa").innerHTML =
        new Date().toLocaleTimeString("en-US",
        {...options, timeZone:"America/New_York"});

    document.getElementById("uk").innerHTML =
        new Date().toLocaleTimeString("en-US",
        {...options, timeZone:"Europe/London"});

    document.getElementById("uae").innerHTML =
        new Date().toLocaleTimeString("en-US",
        {...options, timeZone:"Asia/Dubai"});
}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
```
